name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # 実ブラウザ e2e を CI で必ず走らせる（「CI緑≠起動する」の穴をふさぐ）。
      # Chrome を明示導入し、E2E_REQUIRED=1 で「Chrome 無し＝スキップ」を失敗に変える。
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
      - name: Run tests (依存なし・実ブラウザ e2e を必須化)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          E2E_REQUIRED: '1'
        run: node tests/run-all.js

  build:
    # 本番と同じ手順でビルドし、dist/ が健全（ハンドラ関数が圧縮後も生存）か検証する。
    # デプロイ前に「本番だけ壊れる」事故を検知するのが目的。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deps (esbuild)
        run: npm ci
      - name: Build dist/
        run: npm run build
      - name: Check dist health (ハンドラ関数の生存を検証)
        run: node scripts/check-globals.js
