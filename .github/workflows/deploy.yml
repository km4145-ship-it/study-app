name: Deploy to GitHub Pages

# main に push すると、テスト→ビルド(dist/)→ GitHub Pages へ公開する。
# ※このワークフローが効くのは、リポジトリ設定 Settings → Pages → Source を
#   「GitHub Actions」にした場合のみ。「Deploy from a branch」のままなら無視される。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deps (esbuild)
        run: npm ci
      - name: Test (緑でなければ止める)
        run: node tests/run-all.js
      - name: Build dist/
        run: npm run build
      - name: Check dist health (ハンドラ関数の生存を検証)
        run: node scripts/check-globals.js
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
